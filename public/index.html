<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Drafter — ContentBot</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">✉</div>
        <div>
          <span class="logo-title">ContentBot</span>
          <span class="logo-sub">Email Drafter</span>
        </div>
      </div>
      <span class="badge">Week 2 · CAPACITI Bootcamp</span>
    </div>
  </header>

  <main>
    <div class="left">
      <h1>Draft your email<br/><span>with AI</span></h1>
      <p class="subtitle">Describe what you need — get a polished email in seconds.</p>

      <label class="field-label">Tone</label>
      <select id="tone">
        <option value="professional">Professional</option>
        <option value="friendly">Friendly</option>
        <option value="formal">Formal</option>
        <option value="casual">Casual</option>
        <option value="persuasive">Persuasive</option>
      </select>

      <label class="field-label" style="margin-top:18px">What's this email about?</label>
      <textarea id="context" rows="5" placeholder="e.g. Follow up with a client after our product demo. Mention we're excited to work together and ask for their decision by Friday."></textarea>

      <p class="chips-label">Quick starters</p>
      <div class="chips">
        <button class="chip" onclick="useChip('Follow up email after a job interview. Thank them and reiterate my interest in the role.')">Job follow-up</button>
        <button class="chip" onclick="useChip('Apologise to a client for a project delay and give a new delivery date. Be reassuring.')">Apology email</button>
        <button class="chip" onclick="useChip('Cold outreach to a potential business partner about an AI collaboration opportunity.')">Cold outreach</button>
        <button class="chip" onclick="useChip('Request a meeting with my manager to discuss my career growth and next steps.')">Meeting request</button>
      </div>

      <button id="generateBtn" onclick="generateEmail()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
        Generate Email
      </button>
    </div>

    <div class="right">
      <div class="output-bar">
        <span>Generated Email</span>
        <button class="copy-btn" id="copyBtn" onclick="copyEmail()" style="display:none">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>

      <div id="placeholder" class="placeholder">
        <div class="placeholder-icon">✉</div>
        <p>Your email will appear here</p>
        <span>Fill in the form and click Generate</span>
      </div>

      <div id="loader" class="loader" style="display:none">
        <div class="dots"><span></span><span></span><span></span></div>
        <p>Writing your email...</p>
      </div>

      <div id="result" style="display:none">
        <div id="subjectBox" class="subject-box"></div>
        <div id="emailBody" class="email-body"></div>
      </div>

      <div id="errorBox" class="error-box" style="display:none"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
